<div class="reg-wrapper">
  <div class="reg-card">

    <div class="reg-header">
      <div class="reg-icon"><i class="fas fa-user-plus"></i></div>
      <h3>S'inscrire</h3>
      <p>Créez votre compte en quelques étapes</p>
    </div>

    <div class="reg-body">

      <span class="section-label">Informations générales</span>

      <div class="grid-2">
        <div class="field-group">
          <label>Nom</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" class="form-control" placeholder="Nom complet">
          </div>
        </div>
        <div class="field-group">
          <label>Code fiscal</label>
          <div class="input-wrap">
            <i class="fas fa-id-card"></i>
            <input type="text" class="form-control" placeholder="Code fiscal">
          </div>
        </div>
      </div>

      <div class="field-group">
        <label>E-mail</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" class="form-control" placeholder="exemple@email.com">
        </div>
      </div>

      <div class="field-group">
        <label>Numéro de téléphone</label>
        <div class="input-wrap">
          <i class="fas fa-phone"></i>
          <input type="text" class="form-control" placeholder="+213 XX XX XX XX">
        </div>
      </div>

      <hr class="sep">
      <span class="section-label">Adresse</span>

      <div class="field-group">
        <label>Adresse ligne 1</label>
        <div class="input-wrap">
          <i class="fas fa-map-marker-alt"></i>
          <input type="text" class="form-control" placeholder="Rue, numéro...">
        </div>
      </div>

      <div class="field-group">
        <label>Adresse ligne 2</label>
        <div class="input-wrap">
          <i class="fas fa-map-marker-alt"></i>
          <input type="text" class="form-control" placeholder="Appartement, bâtiment...">
        </div>
      </div>

      <div class="grid-2">
        <div class="field-group">
          <label>Ville</label>
          <div class="input-wrap">
            <i class="fas fa-city"></i>
            <input type="text" class="form-control" placeholder="Ville">
          </div>
        </div>
        <div class="field-group">
          <label>Code postal</label>
          <div class="input-wrap">
            <i class="fas fa-hashtag"></i>
            <input type="text" class="form-control" placeholder="Code postal">
          </div>
        </div>
      </div>

      <div class="field-group">
        <label>Pays</label>
        <div class="input-wrap">
          <i class="fas fa-globe"></i>
          <input type="text" class="form-control" placeholder="Pays">
        </div>
      </div>

      <hr class="sep">
      <span class="section-label">Description</span>

      <div class="field-group">
        <label>Description</label>
        <div class="input-wrap">
          <i class="fas fa-align-left"></i>
          <textarea class="form-control" placeholder="Décrivez votre activité..."></textarea>
        </div>
      </div>

      <button type="button" class="btn-submit">
        <i class="fas fa-check"></i> S'inscrire
      </button>

      <div class="login-row">
        Déjà un compte ?
        <a [routerLink]="['/login']" class="btn-link">Se connecter</a>
      </div>

    </div>
  </div>
</div>

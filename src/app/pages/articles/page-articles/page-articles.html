<div class="articles-page">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Liste des articles</h1>
      <p class="page-subtitle">{{ listArticle.length }} articles au total</p>
    </div>
    <button class="btn-add" (click)="nouvelArticle()">
      <i class="fas fa-plus"></i>
      Nouvel article
    </button>
  </div>

  <!-- Erreur -->
  <div class="alert-err" *ngIf="errorMsg">
    <i class="fas fa-exclamation-circle"></i>
    <span>{{ errorMsg }}</span>
  </div>

  <!-- Barre de recherche -->
  <div class="filter-bar">
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input class="search-input" type="text" placeholder="Rechercher un article..." />
    </div>
  </div>

  <!-- Liste des articles -->
  <div class="table-wrap">
    <div class="table-head">
      <span>Article</span>
      <span>Catégorie</span>
      <span>Prix unitaire</span>
      <span>Stock</span>
      <span></span>
    </div>
    <app-details-articles
      *ngFor="let article of listArticle"
      [articleDto]="article"
      (suppressionResult)="handleSuppression($event)">
    </app-details-articles>
  </div>

  <!-- Pagination -->
  <div class="pagination-wrap" *ngIf="listArticle.length">
    <app-pagination></app-pagination>
  </div>

</div>

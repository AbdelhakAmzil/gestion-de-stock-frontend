<div class="clients-page">

  <div class="page-header">
    <div>
      <h1 class="page-title">Liste des clients</h1>
      <p class="page-subtitle">{{ listClientFiltree.length }} clients au total</p>
    </div>
    <button class="btn-add" (click)="nouveauClient()">
      <i class="fas fa-plus"></i> Nouveau client
    </button>
  </div>

  <div class="alert-err" *ngIf="errorMsg">
    <i class="fas fa-exclamation-circle"></i>
    <span>{{ errorMsg }}</span>
  </div>

  <div class="filter-bar">
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input class="search-input" type="text"
             placeholder="Rechercher un client..."
             (input)="rechercherClient($event)" />
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <span>Client</span>
      <span>Email</span>
      <span>Téléphone</span>
      <span>Adresse</span>
      <span></span>
    </div>
    <app-detail-clt-frs
      *ngFor="let client of listClientFiltree"
      [clientFournisseur]="client"
      [origin]="'client'"
      (suppressionResult)="handleSuppression($event)">
    </app-detail-clt-frs>
  </div>

  <div class="pagination-wrap" *ngIf="listClientFiltree.length">
    <app-pagination></app-pagination>
  </div>

</div>

<header class="app-header">

  <!-- Recherche -->
  <div class="search-wrap">
    <i class="fas fa-search search-icon"></i>
    <input type="text" class="search-input" placeholder="Rechercher..." />
    <span class="search-kbd">⌘K</span>
  </div>

  <div class="spacer"></div>

  <!-- Zone droite -->
  <div class="header-right">

    <!-- Notifications -->
    <button class="icon-btn" title="Notifications">
      <i class="fas fa-bell"></i>
      <span class="notif-dot"></span>
    </button>

    <!-- Paramètres -->
    <button class="icon-btn" title="Paramètres">
      <i class="fas fa-cog"></i>
    </button>

    <div class="header-divider"></div>

    <!-- Profil utilisateur -->
    <a class="user-block" [routerLink]="['/profil']">
      <div class="avatar">
        <img *ngIf="connectedUser.photo"
             [src]="connectedUser.photo"
             [alt]="connectedUser.nom" />
        <span *ngIf="!connectedUser.photo" class="avatar-initials">
          {{ connectedUser.nom | slice:0:1 }}{{ connectedUser.prenom | slice:0:1 }}
        </span>
        <span class="online-dot"></span>
      </div>
      <div class="user-info">
        <span class="user-greet">Bonjour 👋</span>
        <span class="user-name">{{ connectedUser.nom }}</span>
      </div>
      <i class="fas fa-chevron-down user-chevron"></i>
    </a>

  </div>
</header>

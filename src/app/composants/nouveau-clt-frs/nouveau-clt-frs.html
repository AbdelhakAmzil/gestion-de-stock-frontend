<div class="nouveau-clt-frs">

  <!-- Photo -->
  <div class="photo-section">
    <button (click)="fileInput.click()" style="background: transparent; border: none;">
      <img [src]="imgUrl" />
      <input hidden type="file" #fileInput (change)="onFileInput(fileInput.files)">
    </button>
  </div>

  <hr style="border-color: rgba(255,255,255,0.1);">

  <!-- Titre -->
  <div class="section-title">
    <i class="fas fa-info-circle"></i> Information du {{ origin }}
  </div>

  <!-- Erreurs -->
  <div class="alert-err" *ngIf="errorMsg.length > 0">
    <div *ngFor="let msg of errorMsg">{{ msg }}</div>
  </div>

  <!-- Formulaire -->
  <div class="row mb-3">
    <div class="col">
      <input type="text" class="form-control" placeholder="Nom"
             name="nom" [(ngModel)]="clientFournisseur.nom">
    </div>
    <div class="col">
      <input type="text" class="form-control" placeholder="Adresse 1"
             name="adresse1" [(ngModel)]="adresseDto.adresse1">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col">
      <input type="text" class="form-control" placeholder="Prénom"
             name="prenom" [(ngModel)]="clientFournisseur.prenom">
    </div>
    <div class="col">
      <input type="text" class="form-control" placeholder="Adresse 2"
             name="adresse2" [(ngModel)]="adresseDto.adresse2">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col">
      <input type="email" class="form-control" placeholder="E-mail"
             name="email" [(ngModel)]="clientFournisseur.mail">  <!-- ✅ -->
    </div>
    <div class="col">
      <input type="text" class="form-control" placeholder="Ville"
             name="ville" [(ngModel)]="adresseDto.ville">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col">
      <input type="text" class="form-control" placeholder="Téléphone"
             name="numtel" [(ngModel)]="clientFournisseur.numTel">
    </div>
    <div class="col">
      <input type="text" class="form-control" placeholder="Code postal"
             name="codepostal" [(ngModel)]="adresseDto.codePostale">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col"></div>
    <div class="col">
      <input type="text" class="form-control" placeholder="Pays"
             name="pays" [(ngModel)]="adresseDto.pays">
    </div>
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <button class="btn-cancel" (click)="cancelClick()">
      <i class="fas fa-ban"></i> Annuler
    </button>
    <button class="btn-save" (click)="enregistrer()">
      <i class="fas fa-save"></i> Enregistrer
    </button>
  </div>

</div>
